name: Lint and Format Checks

# This pipeline will run every time you push to the main branch 
# or open a pull request against it.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    # We test on Python 3.10 as the repo specifies it as the minimum version
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install Development Dependencies
      run: |
        python -m pip install --upgrade pip
        # Installs the package along with the development tools (black, isort, flake8)
        pip install -e ".[dev]"

    - name: Check code formatting with Black
      run: black --check src/ tests/

    - name: Check import sorting with isort
      run: isort --check-only src/ tests/

    - name: Lint with Flake8
      run: flake8 src/ tests/ --max-line-length=88
